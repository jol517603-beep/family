<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Whiteboard Title · Tan's Family Tree</title>
<!-- A4 LANDSCAPE · tape across the TOP of the whiteboard -->
<style>
  @page { size: A4 landscape; margin: 0; }
  :root { --cream:#f6ecd2; --paper:#fbf4dd; --ink:#3a2418; --gold:#b8860b; --jade:#2e7d5b; --rose:#b91c4b; --tan:#8b5a2b; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background:#2a1810; font-family:'Georgia','Times New Roman',serif; color:var(--ink); }
  body { padding: 14px; }
  @media print { body { padding: 0; background: white; } }
  .page {
    width: 297mm; height: 210mm; margin: 0 auto;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(46,125,91,0.12), transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(184,134,11,0.12), transparent 50%),
      var(--cream);
    padding: 12mm; position: relative;
    box-shadow: 0 14px 36px rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  @media print { .page { box-shadow: none; margin: 0; } }
  .page::before { content:''; position:absolute; inset:5mm; border: 3px double var(--rose); border-radius:4mm; pointer-events:none; }
  .page::after  { content:''; position:absolute; inset:8mm; border: 1.5px solid var(--gold); border-radius:3mm; pointer-events:none; }
  .corner { position:absolute; font-family:'Brush Script MT',cursive; color:var(--rose); opacity:0.4; font-size:46pt; z-index:1; }
  .corner.tl { top: 12mm; left: 18mm; }
  .corner.tr { top: 12mm; right: 18mm; }
  .corner.bl { bottom: 12mm; left: 18mm; }
  .corner.br { bottom: 12mm; right: 18mm; }
  .inner { text-align:center; position:relative; z-index:2; padding: 6mm 14mm; }
  .eyebrow { color:var(--rose); font-style:italic; letter-spacing: 14px; font-size: 13pt; text-transform: uppercase; }
  h1 {
    font-family:'Brush Script MT',cursive; color: var(--rose);
    font-size: 110pt; line-height: 1; margin-top: 2mm;
    text-shadow: 3px 3px 0 var(--gold);
  }
  .zh {
    color: var(--jade); font-size: 64pt; margin-top: 2mm;
    letter-spacing: 18px;
    font-family: 'Georgia', 'STKaiti', '楷体', serif;
  }
  .underline {
    width: 60%; margin: 6mm auto 4mm;
    border-top: 2px solid var(--gold);
    position: relative;
  }
  .underline::before, .underline::after {
    content:'✦'; position:absolute; top:-9pt;
    color: var(--rose); font-size: 14pt;
  }
  .underline::before { left: -10mm; }
  .underline::after  { right: -10mm; }
  .sub {
    color: var(--tan); font-style: italic; font-size: 16pt;
    letter-spacing: 4px;
  }
  .tagline {
    margin-top: 3mm; color: var(--ink); font-size: 12pt;
    font-style: italic;
  }
  .tagline b { color: var(--rose); font-weight: normal; }
</style></head>
<body>
<div class="page">
  <span class="corner tl">✦</span>
  <span class="corner tr">✦</span>
  <span class="corner bl">✦</span>
  <span class="corner br">✦</span>

  <div class="inner">
    <div class="eyebrow">✦ Roots of the Rose ✦</div>
    <h1>Tan's Family Tree</h1>
    <div class="zh">陳家根譜</div>
    <div class="underline"></div>
    <div class="sub">~ four generations · one reunion night ~</div>
    <div class="tagline"><b>read</b> the story · <b>match</b> the face · <b>pin</b> the truth</div>
  </div>
</div>
</body></html>
